name: Build Albrhi tweak for Rootless

on:
    push:
        branches:
            - 'main'
            - 'dev'
    workflow_dispatch:
  
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    build:
        name: Build Albrhi Rootless
        runs-on: macos-latest
        permissions:
            contents: write

        steps:
            - name: Checkout Main
              uses: actions/checkout@v4
              with:
                path: main
                submodules: recursive

            - name: Install Dependencies
              run: brew install ldid dpkg make

            - name: Set PATH environment variable
              run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH 

            - name: Setup Theos
              uses: actions/checkout@v4
              with:
                repository: theos/theos
                ref: master
                path: ${{ github.workspace }}/theos
                submodules: recursive
        
            - name: SDK Caching
              id: SDK
              uses: actions/cache@v4
              env:
                cache-name: iPhoneOS16.2.sdk
              with:
                path: ${{ github.workspace }}/theos/sdks/
                key: ${{ env.cache-name }}
                restore-keys: ${{ env.cache-name }}

            - name: Download iOS SDK
              if: steps.SDK.outputs.cache-hit != 'true'
              run: |
                git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs/
                cd iOS-SDKs
                git sparse-checkout set --no-cone iPhoneOS16.2.sdk
                git checkout
                mv *.sdk $THEOS/sdks
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Get Albrhi Version
              id: albrhi_version
              run: |
                # Anchored to the start of the line: the Description block is multi-line
                # and must never be mistaken for the version field.
                ALBRHI_VERSION=$(awk -F': *' '/^Version:/ {print $2; exit}' main/control)

                if [ -z "$ALBRHI_VERSION" ]; then
                  echo "::error::Could not read Version from control"
                  exit 1
                fi

                echo "ALBRHI_VERSION=${ALBRHI_VERSION}" >> "$GITHUB_ENV"
                echo "version=${ALBRHI_VERSION}" >> "$GITHUB_OUTPUT"
            
            - name: Build Albrhi tweak for Rootless
              run: |                
                cd main
                ls -la

                chmod +x build.sh
                ./build.sh rootless
                ls -la packages
                
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Rename deb to include version info
              run: |
                cd main/packages

                BUILT_DEB=$(ls -t *.deb | head -n1)
                if [ -z "$BUILT_DEB" ]; then
                  echo "::error::No .deb produced by build.sh"
                  exit 1
                fi

                mv "$BUILT_DEB" "com.albrhi.tweak_${ALBRHI_VERSION}+rootless.deb"

            - name: Pass package name to upload action
              id: package_name
              run: |
                echo "package=com.albrhi.tweak_${ALBRHI_VERSION}+rootless.deb" >> "$GITHUB_OUTPUT"

            - name: Upload Artifact
              uses: actions/upload-artifact@v4
              with:
                name: ${{ steps.package_name.outputs.package }}
                path: ${{ github.workspace }}/main/packages/${{ steps.package_name.outputs.package }}
                if-no-files-found: error
