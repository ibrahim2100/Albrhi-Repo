name: Build, release and publish repo

on:
    push:
        branches:
            - 'main'
            - 'dev'
        tags:
            - 'v*'
    workflow_dispatch:
        inputs:
            force_rebuild:
                description: 'Rebuild even if this version was already released'
                type: boolean
                default: false
  
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
jobs:
    build:
        name: Build rootless + roothide + dylib
        runs-on: macos-latest

        # Required by actions/deploy-pages, which refuses to run without it.
        environment:
            name: github-pages
            url: ${{ steps.deploy.outputs.page_url }}

        permissions:
            contents: write
            # Needed to deploy the APT index ourselves. GitHub does not start a
            # workflow from a push made with GITHUB_TOKEN, and the implicit Pages
            # build that used to be exempt no longer fires — so the branch updated
            # while the site kept serving the previous release. Deploying from this
            # job removes the dependency on that trigger entirely.
            pages: write
            id-token: write

        steps:
            - name: Checkout Main
              uses: actions/checkout@v4
              with:
                path: main
                submodules: recursive

            - name: Source checks
              run: |
                cd main
                # Cheap structural checks that catch the mistakes that have actually
                # broken this build before: unbalanced braces, duplicate @interface,
                # fragile %orig placement, multi-line string literals, localization
                # drift and version mismatch. Runs before Theos so a typo fails in
                # seconds instead of minutes.
                python3 tools/check.py

            - name: Get Albrhi Version
              id: albrhi_version
              run: |
                # Anchored to the start of the line: the Description block is multi-line
                # and must never be mistaken for the version field.
                ALBRHI_VERSION=$(awk -F': *' '/^Version:/ {print $2; exit}' main/control)

                if [ -z "$ALBRHI_VERSION" ]; then
                  echo "::error::Could not read Version from control"
                  exit 1
                fi

                echo "ALBRHI_VERSION=${ALBRHI_VERSION}" >> "$GITHUB_ENV"
                echo "version=${ALBRHI_VERSION}" >> "$GITHUB_OUTPUT"
            
            - name: Point control at this repository
              run: |
                cd main

                # Homepage and depiction URLs are rewritten from the repository this
                # build is running in, so renaming the repo needs no edit in control.
                OWNER="${{ github.repository_owner }}"
                PROJECT="${{ github.event.repository.name }}"

                sed -i.bak \
                  -e "s|^Homepage: .*|Homepage: https://github.com/${OWNER}/${PROJECT}|" \
                  -e "s|^Icon: .*|Icon: https://${OWNER}.github.io/${PROJECT}/CydiaIcon.png|" \
                  -e "s|^Depiction: .*|Depiction: https://${OWNER}.github.io/${PROJECT}/depictions/albrhi.html|" \
                  -e "s|^SileoDepiction: .*|SileoDepiction: https://${OWNER}.github.io/${PROJECT}/depictions/albrhi.json|" \
                  control
                rm -f control.bak

                grep -E '^(Homepage|Icon|Depiction|SileoDepiction):' control

            - name: Decide whether a build is needed
              id: release_check
              env:
                GH_TOKEN: ${{ github.token }}
              run: |
                # Building takes minutes; reading a tag takes a second. If this
                # version was already released, its packages are already published
                # and identical -- reuse them instead of compiling them again.
                if [ "${{ github.event.inputs.force_rebuild }}" = "true" ]; then
                  echo "Forced rebuild requested."
                  echo "needed=true" >> "$GITHUB_OUTPUT"
                elif gh release view "v${ALBRHI_VERSION}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
                  echo "::notice::v${ALBRHI_VERSION} is already released - skipping the build."
                  echo "::notice::Bump Version in control to build again, or run the workflow manually with force_rebuild."
                  echo "needed=false" >> "$GITHUB_OUTPUT"
                else
                  echo "v${ALBRHI_VERSION} is new - building."
                  echo "needed=true" >> "$GITHUB_OUTPUT"
                fi

            - name: Install dpkg
              # Always needed: the repo index is built with dpkg-scanpackages and
              # dpkg-deb even on runs that skip the tweak build entirely.
              run: brew install dpkg

            - name: Install build dependencies
              if: steps.release_check.outputs.needed == 'true'
              run: brew install ldid make

            - name: Set PATH environment variable
              if: steps.release_check.outputs.needed == 'true'
              run: echo "$(brew --prefix make)/libexec/gnubin" >> $GITHUB_PATH 

            - name: Setup Theos
              if: steps.release_check.outputs.needed == 'true'
              uses: actions/checkout@v4
              with:
                repository: theos/theos
                ref: master
                path: ${{ github.workspace }}/theos
                submodules: recursive
        
            - name: SDK Caching
              if: steps.release_check.outputs.needed == 'true'
              id: SDK
              uses: actions/cache@v4
              env:
                cache-name: iPhoneOS16.2.sdk
              with:
                path: ${{ github.workspace }}/theos/sdks/
                key: ${{ env.cache-name }}
                restore-keys: ${{ env.cache-name }}

            - name: Download iOS SDK
              if: steps.release_check.outputs.needed == 'true' && steps.SDK.outputs.cache-hit != 'true'
              run: |
                git clone --quiet -n --depth=1 --filter=tree:0 https://github.com/xybp888/iOS-SDKs/
                cd iOS-SDKs
                git sparse-checkout set --no-cone iPhoneOS16.2.sdk
                git checkout
                mv *.sdk $THEOS/sdks
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Build Albrhi tweak for Rootless
              if: steps.release_check.outputs.needed == 'true'
              run: |                
                cd main
                ls -la

                chmod +x build.sh
                ./build.sh rootless
                ls -la packages
                
              env:
                THEOS: ${{ github.workspace }}/theos

            - name: Rename deb to include version info
              if: steps.release_check.outputs.needed == 'true'
              run: |
                cd main/packages

                BUILT_DEB=$(ls -t *.deb | head -n1)
                if [ -z "$BUILT_DEB" ]; then
                  echo "::error::No .deb produced by build.sh"
                  exit 1
                fi

                mv "$BUILT_DEB" "com.albrhi.tweak_${ALBRHI_VERSION}+rootless.deb"

            - name: Build the standalone dylib for sideloading
              if: steps.release_check.outputs.needed == 'true'
              env:
                # This step invokes make directly rather than through build.sh, so
                # it needs THEOS declared just as the other build steps do —
                # without it the Makefile's include expands to /makefiles/common.mk
                # and nothing builds.
                THEOS: ${{ github.workspace }}/theos
              run: |
                cd main

                # Built separately from the packages, not copied out of them. The
                # package binary hooks through CydiaSubstrate, which a sideloaded
                # app has no reason to have — injected on its own it would load
                # nothing and Instagram would simply look untweaked, with no error
                # to explain why. This build carries its own hooking instead.
                make clean
                rm -rf .theos

                # Same scheme the published dylib was built under before, so the
                # only difference from the previous binary is the hooking layer.
                export THEOS_PACKAGE_SCHEME=rootless
                make SELFCONTAINED=1 FINALPACKAGE=1

                DYLIB=$(find .theos/obj -name 'Albrhi.dylib' -type f | head -n1)

                if [ -z "$DYLIB" ]; then
                  echo "::error::Albrhi.dylib not found under .theos/obj"
                  exit 1
                fi

                # Proof, not assumption: calling this standalone is something the
                # user would otherwise only get to disprove on their own device,
                # where the failure is silent — Instagram just looks untweaked.
                echo "Linked libraries:"
                otool -L "$DYLIB"

                if otool -L "$DYLIB" | grep -qi 'substrate'; then
                  echo "::error::The dylib still links CydiaSubstrate — it is not standalone"
                  exit 1
                fi

                # The stricter half. A library can be dropped from the load
                # commands while an undefined MS* symbol remains, and that would
                # fail at load time rather than here. Every symbol the dylib still
                # expects from outside is listed, and any MS one is fatal.
                echo "Undefined symbols beginning with MS:"
                nm -u "$DYLIB" | grep -E '^_MS' || echo "  (none)"

                if nm -u "$DYLIB" | grep -qE '^_MS'; then
                  echo "::error::The dylib still expects Substrate symbols at load time"
                  nm -u "$DYLIB" | grep -E '^_MS'
                  exit 1
                fi

                echo "Standalone: no Substrate library, no Substrate symbols."

                cp "$DYLIB" "packages/Albrhi_${ALBRHI_VERSION}.dylib"

                # The package builds that follow must not inherit this build's
                # objects, or a .deb would ship the sideload flavour.
                make clean
                rm -rf .theos

                ls -la packages

            - name: Setup roothide Theos
              if: steps.release_check.outputs.needed == 'true'
              uses: actions/checkout@v4
              with:
                repository: roothide/theos
                ref: master
                path: ${{ github.workspace }}/theos-roothide
                submodules: recursive

            - name: Share the SDK with roothide Theos
              if: steps.release_check.outputs.needed == 'true'
              run: |
                mkdir -p "${{ github.workspace }}/theos-roothide/sdks"
                cp -R "${{ github.workspace }}/theos/sdks/." "${{ github.workspace }}/theos-roothide/sdks/"
                ls "${{ github.workspace }}/theos-roothide/sdks"

            - name: Build Albrhi tweak for roothide
              if: steps.release_check.outputs.needed == 'true'
              run: |
                cd main
                ./build.sh roothide
                ls -la packages
              env:
                THEOS: ${{ github.workspace }}/theos-roothide

            - name: Rename roothide deb
              if: steps.release_check.outputs.needed == 'true'
              run: |
                cd main/packages

                # The roothide build packages under its own identity, so match on
                # that rather than on "whatever is newest" -- an exact name cannot
                # pick up the wrong file.
                BUILT_DEB=$(ls -t com.albrhi.tweak.roothide_*.deb 2>/dev/null | head -n1)
                if [ -z "$BUILT_DEB" ]; then
                  echo "::error::No roothide .deb produced"
                  exit 1
                fi

                TARGET="com.albrhi.tweak.roothide_${ALBRHI_VERSION}.deb"
                if [ "$BUILT_DEB" != "$TARGET" ]; then
                  mv "$BUILT_DEB" "$TARGET"
                fi

                ls -la

            - name: Reuse packages from the existing release
              if: steps.release_check.outputs.needed != 'true'
              env:
                GH_TOKEN: ${{ github.token }}
              run: |
                mkdir -p main/packages

                # The published assets for this version are byte-identical to what a
                # rebuild would produce, so the repo can be refreshed without one.
                gh release download "v${ALBRHI_VERSION}" \
                  --repo "${{ github.repository }}" \
                  --dir main/packages \
                  --clobber

                ls -la main/packages

            - name: Pass package name to upload action
              id: package_name
              run: |
                echo "package=com.albrhi.tweak_${ALBRHI_VERSION}+rootless.deb" >> "$GITHUB_OUTPUT"
                echo "dylib=Albrhi_${ALBRHI_VERSION}.dylib" >> "$GITHUB_OUTPUT"
                echo "roothide=com.albrhi.tweak.roothide_${ALBRHI_VERSION}.deb" >> "$GITHUB_OUTPUT"

            - name: Upload Artifact
              if: steps.release_check.outputs.needed == 'true'
              uses: actions/upload-artifact@v4
              with:
                name: Albrhi-${{ env.ALBRHI_VERSION }}
                path: |
                  ${{ github.workspace }}/main/packages/${{ steps.package_name.outputs.package }}
                  ${{ github.workspace }}/main/packages/${{ steps.package_name.outputs.dylib }}
                  ${{ github.workspace }}/main/packages/${{ steps.package_name.outputs.roothide }}
                if-no-files-found: error

            - name: Extract changelog for this version
              if: steps.release_check.outputs.needed == 'true'
              run: |
                # Pull the section for this version out of CHANGELOG.md: everything
                # from its heading up to the next "## " heading.
                awk -v ver="$ALBRHI_VERSION" '
                  $0 ~ "^## v?" ver { found=1; next }
                  found && /^## / { exit }
                  found { print }
                ' main/CHANGELOG.md > release-notes.md

                if [ ! -s release-notes.md ]; then
                  echo "Release ${ALBRHI_VERSION}." > release-notes.md
                fi

                {
                  echo ""
                  echo "---"
                  echo ""
                  echo "**Jailbroken** — download the \`.deb\` matching your jailbreak (rootless or roothide)"
                  echo "and open it in Sileo or Zebra, then respring."
                  echo ""
                  echo "**Sideloading** — use the \`.dylib\` with LiveContainer, Sideloadly or cyan to inject it into a decrypted Instagram IPA."
                  echo ""
                  echo "**Tested on Instagram 410.1.0** — the newest build the developer's phone will still accept."
                  echo "It is not a compatibility ceiling, it is a hardware confession. Nothing here is pinned to a"
                  echo "version number, so newer builds should be fine; reports from them are especially welcome."
                  echo ""
                  echo "This is a beta. If something misbehaves, open Settings -> Diagnostics -> Report an issue —"
                  echo "it fills in a bug report with your Instagram build and what the tweak actually attached to."
                } >> release-notes.md

            - name: Publish release
              if: steps.release_check.outputs.needed == 'true'
              uses: softprops/action-gh-release@v2
              with:
                name: Albrhi ${{ env.ALBRHI_VERSION }}
                tag_name: v${{ env.ALBRHI_VERSION }}
                target_commitish: ${{ github.sha }}
                body_path: release-notes.md
                prerelease: true
                files: |
                  ${{ github.workspace }}/main/packages/${{ steps.package_name.outputs.package }}
                  ${{ github.workspace }}/main/packages/${{ steps.package_name.outputs.dylib }}
                  ${{ github.workspace }}/main/packages/${{ steps.package_name.outputs.roothide }}
                fail_on_unmatched_files: true

            - name: Prepare added packages
              if: github.ref == 'refs/heads/main'
              env:
                GH_TOKEN: ${{ github.token }}
              run: |
                cd main

                # A control archive compressed with xz is unreadable in the browser
                # tool, which has no LZMA decoder. Converting the container here --
                # payload untouched -- means a package uploaded from a phone can be
                # edited from a phone afterwards.
                changed=0

                for deb in extra-debs/*.deb; do
                  [ -e "$deb" ] || continue

                  if python3 tools/deb-edit.py normalize "$deb" | grep -q '^Converted'; then
                    echo "Normalised $deb"
                    changed=1
                  fi

                  # Several flavours of one tweak otherwise appear in Sileo under
                  # identical names, and the wrong one gets installed. The label is
                  # read from the architecture, so it is a fact, not a guess.
                  if python3 tools/deb-edit.py label "$deb" | grep -q '^Labelled'; then
                    echo "Labelled $deb"
                    changed=1
                  fi
                done

                if [ "$changed" -eq 0 ]; then
                  echo "Nothing to prepare."
                  exit 0
                fi

                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add extra-debs

                # [skip ci] matters: this commit lands on main, and without it the
                # workflow would trigger itself again.
                git commit -q -m "Prepare added packages: normalise and label [skip ci]"
                git push -q "https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main

            - name: Publish APT repo to GitHub Pages
              if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
              env:
                GH_TOKEN: ${{ github.token }}
              run: |
                set -x
                REPO_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
                REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"

                rm -rf pages
                mkdir pages
                cd pages
                git init -q
                git remote add origin "$REMOTE"

                # Ask whether the branch exists rather than inferring it from a failed
                # clone: a failed clone can leave a partial directory behind, which is
                # what broke the first attempt at this step.
                if git ls-remote --exit-code --heads origin gh-pages >/dev/null 2>&1; then
                  echo "gh-pages exists — fetching it."
                  git fetch -q --depth 1 origin gh-pages
                  git checkout -q -b gh-pages FETCH_HEAD
                else
                  echo "gh-pages does not exist — starting a fresh branch."
                  git checkout -q -b gh-pages
                fi

                cd ..

                chmod +x main/tools/make-repo.sh
                ./main/tools/make-repo.sh main/packages pages "$REPO_URL"

                cp main/tools/repo-index.html pages/index.html

                # The deb editor, usable from any device including a phone.
                mkdir -p pages/deb-edit
                cp main/tools/deb-edit.html pages/deb-edit/index.html

                # Puts the tweak inside an Instagram IPA, entirely in the visitor's
                # browser. Nothing is uploaded, so hosting the page carries none of
                # the risk that hosting an IPA would.
                mkdir -p pages/inject
                cp main/tools/ipa-inject.html pages/inject/index.html

                # Regenerated every run so the version and changelog shown on the
                # package page always match what was actually built. The generator
                # reads CHANGELOG.md relative to its own working directory, hence
                # the cd; the output path is absolute so the cd cannot redirect it.
                PAGES_DIR="$(pwd)/pages"
                ( cd main && python3 tools/make-depiction.py "$PAGES_DIR" "$ALBRHI_VERSION" "$REPO_URL" )

                ls -la pages/depictions

                # Source icon, shown beside the repo name in Sileo and Zebra.
                # Regenerated each run; drop tools/logo.png in to override it.
                python3 main/tools/make-logo.py pages/CydiaIcon.png 512

                # GitHub Pages skips files and folders beginning with an underscore
                # unless this marker is present. Harmless here, and prevents a class
                # of silent 404s.
                touch pages/.nojekyll

                cd pages
                git config user.name "github-actions[bot]"
                git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
                git add -A

                if git diff --cached --quiet; then
                  echo "Repo index unchanged — nothing to push."
                  exit 0
                fi

                git commit -q -m "Repo: Albrhi ${ALBRHI_VERSION}"
                git push -q origin gh-pages

                echo "Index committed to gh-pages; the deploy steps below publish it."

            # The branch above stays the source of truth and stays readable. These
            # steps only make the publish explicit: it succeeds or fails inside this
            # run, with a log, instead of depending on a trigger that can stop
            # firing without notice — which is exactly what happened.
            - name: Upload the repo for Pages
              if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
              uses: actions/upload-pages-artifact@v3
              with:
                path: pages

            - name: Deploy to Pages
              id: deploy
              if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
              uses: actions/deploy-pages@v4
